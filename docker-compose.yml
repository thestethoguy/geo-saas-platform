version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL 15 – Primary relational database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: geo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-geouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geopassword}
      POSTGRES_DB: ${POSTGRES_DB:-geosaas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d  # auto-run migrations on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geouser -d geosaas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geo_net

  # ─────────────────────────────────────────────
  # Redis 7 – Cache + Rate Limiting
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: geo_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geo_net

  # ─────────────────────────────────────────────
  # Typesense – Full-text search & autocomplete
  # ─────────────────────────────────────────────
  typesense:
    image: typesense/typesense:0.25.2
    container_name: geo_typesense
    restart: unless-stopped
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-typesense-dev-key}
      TYPESENSE_DATA_DIR: /data
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8108/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - geo_net

# ─────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  typesense_data:

networks:
  geo_net:
    driver: bridge
